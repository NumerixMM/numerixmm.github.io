<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Numerix Games and Apps</title>

 
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      height: 100vh;
      background: linear-gradient(135deg, #1a1f2b, #0f1117),
        url('https://www.transparenttextures.com/patterns/pixel-weave.png');
      background-size: cover;
      background-repeat: repeat;
      overflow: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Neon Dots Container */
    .neon-dots {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: 0;
    }

    .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #00e5ff;
      border-radius: 50%;
      opacity: 0;
      animation: blink 3s infinite ease-in-out;
    }

    .dot:nth-child(odd) {
      background: #ff00ff;
    }

    .dot:nth-child(even) {
      background: #00e5ff;
    }

    @keyframes blink {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.7; transform: scale(1.2); }
    }

    #message {
      background: rgba(0, 0, 0, 0.75);
      padding: 40px 30px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
      text-align: center;
      animation: fadeIn 1.2s ease-out;
      z-index: 2;
    }

    #message h2 {
      color: #00e5ff;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 20px;
    }

    #message h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 20px;
      color: #fff;
    }

    #message p {
      font-size: 14px;
      margin-bottom: 25px;
    }

    #message a {
      display: inline-block;
      background: #00bcd4;
      color: white;
      padding: 14px 24px;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: 0 0 10px #00e5ff;
      transition: all 0.3s ease;
    }

    #message a:hover {
      background: #00acc1;
      box-shadow: 0 0 20px #00e5ff;
    }

    #load {
      position: absolute;
      bottom: 16px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #aaa;
      z-index: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      #message {
        padding: 30px 20px;
      }

      #message h1 {
        font-size: 24px;
      }

      #message a {
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Neon background dots -->
  <div class="neon-dots" id="dot-container"></div>

  <div id="message">
    <h2>Welcome</h2>
    <h1>Numerix Games and Apps</h1>
    <p></p>
    <a target="Privacy Policy" href="https://sites.google.com/numerixgames.com/numerixprivacypolicy/home">Privacy Policy</a>
  </div>
  

  <script>
    // Firebase Loader
    
    

    // Generate random neon dots
    const dotContainer = document.getElementById('dot-container');
    const dotCount = 40;

    for (let i = 0; i < dotCount; i++) {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      dot.style.top = Math.random() * 100 + '%';
      dot.style.left = Math.random() * 100 + '%';
      dot.style.animationDelay = (Math.random() * 3) + 's';
      dotContainer.appendChild(dot);
    }
  </script>
</body>
</html>
